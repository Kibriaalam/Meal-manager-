<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Manager</title>
<style>
:root{--green:#1a6b3c;--green-light:#2d9b5a;--green-pale:#e8f5ee;--amber:#e67e22;--amber-light:#fdf3e7;--red:#c0392b;--red-light:#fdf0ef;--blue:#1565c0;--blue-light:#e3f0fd;--gray-bg:#f5f6fa;--gray-border:#dee2e8;--text:#1a1a2e;--text-muted:#6b7280;--shadow:0 2px 12px rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gray-bg);color:var(--text);min-height:100vh;font-size:14px}
.hd{background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:0.72rem;opacity:0.85}
.hd-date{font-size:0.75rem;background:rgba(255,255,255,0.15);padding:5px 10px;border-radius:20px}
.hd-logo{display:flex;align-items:center;gap:12px}
.hd-logo img{width:60px;height:60px;object-fit:contain}
.nav{display:flex;background:#fff;border-bottom:2px solid var(--gray-border);overflow-x:auto;padding:0 6px;position:sticky;top:56px;z-index:99;box-shadow:var(--shadow)}
.tab{padding:10px 12px;cursor:pointer;font-size:0.75rem;font-weight:600;color:var(--text-muted);white-space:nowrap;border-bottom:3px solid transparent}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.content{padding:12px;max-width:900px;margin:0 auto}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--gray-border)}
.card-t{font-size:0.95rem;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:2px solid var(--green-pale)}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:10px;padding:12px;box-shadow:var(--shadow);border-left:4px solid;text-align:center}
.stat.g{border-color:var(--green)}.stat.a{border-color:var(--amber)}.stat.b{border-color:var(--blue)}.stat.r{border-color:var(--red)}
.stat-v{font-size:1.3rem;font-weight:800;margin-bottom:2px}
.stat-l{font-size:0.68rem;color:var(--text-muted);font-weight:600;text-transform:uppercase}
.stat.g .stat-v{color:var(--green)}.stat.a .stat-v{color:var(--amber)}.stat.b .stat-v{color:var(--blue)}.stat.r .stat-v{color:var(--red)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.one{grid-template-columns:1fr}
.gp{display:flex;flex-direction:column;gap:3px}
label{font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase}
input,select,textarea{border:1.5px solid var(--gray-border);border-radius:7px;padding:7px 10px;font-size:0.88rem;color:var(--text);outline:none;font-family:inherit;background:#fff;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
textarea{resize:vertical;min-height:55px}
.btn{padding:8px 14px;border:none;border-radius:7px;font-size:0.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--green);color:#fff}.btn-d{background:var(--red);color:#fff}.btn-a{background:var(--amber);color:#fff}.btn-b{background:var(--blue);color:#fff}.btn-o{background:transparent;border:1.5px solid var(--green);color:var(--green)}
.btn-sm{padding:4px 9px;font-size:0.72rem}
.tw{overflow-x:auto;border-radius:7px;border:1px solid var(--gray-border)}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{background:var(--green);color:#fff;padding:7px 9px;text-align:left;font-size:0.72rem;font-weight:600;white-space:nowrap}
td{padding:6px 9px;border-bottom:1px solid var(--gray-border)}
tr:hover td{background:var(--green-pale)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.68rem;font-weight:700}
.bg{background:var(--green-pale);color:var(--green)}.br{background:var(--red-light);color:var(--red)}.ba{background:var(--amber-light);color:var(--amber)}.bbl{background:var(--blue-light);color:var(--blue)}
.empty{text-align:center;padding:30px 12px;color:var(--text-muted)}
.empty .icon{font-size:2rem;margin-bottom:6px}
.alert{padding:9px 12px;border-radius:7px;margin-bottom:8px;font-size:0.82rem;display:flex;align-items:center;gap:6px}
.ag{background:var(--green-pale);color:var(--green);border:1px solid #a7d5b8}
.ar{background:var(--red-light);color:var(--red);border:1px solid #f1a8a3}
.brow{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:7px 10px;background:var(--gray-bg);border-radius:7px;border:1px solid var(--gray-border)}
.brow input{flex:1;margin:0}
.tot{background:var(--green-pale);border:1.5px solid var(--green);font-weight:700;color:var(--green);padding:8px 12px;border-radius:7px;display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.slbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px}
.mi{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid var(--gray-border);border-radius:8px;margin-bottom:5px}
.ma{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:0.85rem}
.mname{font-weight:700;font-size:0.85rem}.mmeta{font-size:0.7rem;color:var(--text-muted)}
.mb{font-weight:700;font-size:0.85rem}.bp{color:var(--green)}.bn{color:var(--red)}
.etg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.etb{padding:9px;border-radius:8px;border:2px solid var(--gray-border);background:#fff;cursor:pointer;text-align:center;font-size:0.75rem;font-weight:600}
.etb.sel{border-color:var(--green);background:var(--green-pale);color:var(--green)}
.etb .icon{font-size:1.1rem;display:block;margin-bottom:2px}
.sb{display:flex;gap:8px;margin-bottom:10px}
.sb input,.sb select{flex:1}
.ni{padding:10px 12px;border-left:4px solid var(--green);background:var(--green-pale);border-radius:6px;margin-bottom:6px}
.ni.urgent{border-color:var(--red);background:var(--red-light)}
.ni.important{border-color:var(--amber);background:var(--amber-light)}
.nt{font-weight:700;margin-bottom:3px;font-size:0.88rem}
.nb{font-size:0.82rem}
.nm{font-size:0.68rem;color:var(--text-muted);margin-top:3px}
.fs{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--green-pale);border-radius:7px;margin-bottom:5px;border-left:4px solid var(--green)}
.bd-card{padding:10px 12px;background:linear-gradient(135deg,#fdf3e7,#fdf0ef);border-radius:8px;margin-bottom:6px;border-left:4px solid var(--amber)}
@media(max-width:500px){.row{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.etg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hd"><div class="hd-logo"><img src="logo.png" alt="Meal Manager"><div><h1>Meal Manager</h1><div class="sub" id="messName">Meal Manager</div></div></div><div class="hd-date" id="hd"></div></div>
<div class="nav" id="nav"></div>
<div class="content" id="content"></div>
<script>
let DB={settings:{messName:'Meal Manager',defaultBill:200,address:'',manager:''},members:[],floors:['১ম তলা','২য় তলা','৩য় তলা','৪র্থ তলা','৫ম তলা','৬ষ্ঠ তলা'],mealoffs:[],payments:[],bazars:[],expenses:[],meals:[],guests:[],notices:[],advances:[],messoffs:[],memberHistory:[]};
let CUR='dashboard';
const PAGES=[
{id:'dashboard',icon:'🏠',name:'ড্যাশবোর্ড'},
{id:'members',icon:'👥',name:'সদস্য'},
{id:'mealoff',icon:'🔕',name:'মিল অফ'},
{id:'payment',icon:'💵',name:'পেমেন্ট'},
{id:'bazar',icon:'🛒',name:'বাজার'},
{id:'expenses',icon:'💡',name:'খরচ'},
{id:'meals',icon:'🍱',name:'মিল'},
{id:'guest',icon:'👨‍👩‍👧',name:'অতিথি'},
{id:'floors',icon:'🏢',name:'ফ্লোর'},
{id:'notices',icon:'📢',name:'নোটিশ'},
{id:'messoff',icon:'🏠❌',name:'মেস বন্ধ'},
{id:'advance',icon:'💰',name:'অগ্রিম'},
{id:'history',icon:'📜',name:'ইতিহাস'},
{id:'statement',icon:'🧾',name:'স্টেটমেন্ট'},
{id:'report',icon:'📊',name:'রিপোর্ট'},
{id:'settings',icon:'⚙️',name:'সেটিংস'}
];
function save(){localStorage.setItem('messDB',JSON.stringify(DB))}
function load(){try{const d=localStorage.getItem('messDB');if(d){const x=JSON.parse(d);Object.keys(x).forEach(k=>DB[k]=x[k])}}catch(e){}}
function today(){return new Date().toISOString().split('T')[0]}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmtMoney(n){return '৳'+(Number(n)||0).toLocaleString('en-IN')}
function esc(s){return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'})[c])}
function alert(msg,type='g'){const a=document.createElement('div');a.className='alert a'+type;a.textContent=(type==='g'?'✅ ':'⚠️ ')+msg;a.style.cssText='position:fixed;top:70px;right:12px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,0.15)';document.body.appendChild(a);setTimeout(()=>a.remove(),2200)}
function floorOpts(sel){return DB.floors.map(f=>`<option value="${esc(f)}" ${f===sel?'selected':''}>${esc(f)}</option>`).join('')}

function renderNav(){
  document.getElementById('nav').innerHTML=PAGES.map(p=>`<div class="tab ${p.id===CUR?'active':''}" data-p="${p.id}" onclick="showPage('${p.id}')">${p.icon} ${p.name}</div>`).join('');
}

function showPage(p){CUR=p;renderNav();renderPage()}
function renderPage(){
  const fn={dashboard:pgDashboard,members:pgMembers,mealoff:pgMealoff,payment:pgPayment,bazar:pgBazar,expenses:pgExpenses,meals:pgMeals,guest:pgGuest,floors:pgFloors,notices:pgNotices,messoff:pgMessoff,advance:pgAdvance,history:pgHistory,statement:pgStatement,report:pgReport,settings:pgSettings}[CUR];
  document.getElementById('content').innerHTML=fn();
  if(CUR==='members'){document.getElementById('m-bill').value=DB.settings.defaultBill||200}
  if(CUR==='dashboard')renderDashExtras();
  if(CUR==='mealoff')setMoffDefaults();
  if(CUR==='payment')setPayDefaults();
  if(CUR==='bazar')setBazarDefaults();
  if(CUR==='expenses')setExpDefaults();
  if(CUR==='meals')setMealDefaults();
  if(CUR==='guest')setGuestDefaults();
  if(CUR==='report'){const el=document.getElementById('rpt-month');if(el)el.value=thisMonth()}
  if(CUR==='settings')loadSettings();
  if(CUR==='messoff')setMessoffDefaults();
  if(CUR==='advance')setAdvanceDefaults();
  if(CUR==='history')renderMemberHistory();
  if(CUR==='statement')setStmtDefaults();
}

function renderDashExtras(){
  const fc=document.getElementById('dash-floors');
  if(fc){
    if(!DB.floors.length){fc.innerHTML='<div class="empty"><div class="icon">🏢</div><p>ফ্লোর যোগ করুন</p></div>';}
    else{fc.innerHTML=DB.floors.map(f=>{const c=DB.members.filter(m=>m.floor===f).length;return `<div class="fs"><div style="font-size:1.3rem">🏢</div><div style="flex:1"><b>${esc(f)}</b></div><div><b style="color:var(--green);font-size:1.05rem">${c}</b> জন</div></div>`}).join('');}
  }
  const nc=document.getElementById('dash-notices');
  if(nc){
    const last=DB.notices.slice(-3).reverse();
    if(!last.length){nc.innerHTML='<div class="empty"><div class="icon">📢</div><p>কোনো নোটিশ নেই</p></div>';}
    else{nc.innerHTML=last.map(n=>`<div class="ni ${n.priority}"><div class="nt">📌 ${esc(n.title)}</div><div class="nb">${esc(n.body||'')}</div><div class="nm">${fmtDate(n.date)}</div></div>`).join('');}
  }
  const bc=document.getElementById('dash-bd');
  if(bc){
    const todayStr=today().slice(5);
    const tdy=DB.members.filter(m=>m.birthday&&m.birthday.slice(5)===todayStr);
    if(!tdy.length){bc.innerHTML='<div style="color:var(--text-muted);font-size:0.82rem">আজ কারো জন্মদিন নেই</div>';}
    else{bc.innerHTML=tdy.map(m=>`<div class="bd-card">🎂 <b>${esc(m.name)}</b> (রুম ${esc(m.room)}) - আজ জন্মদিন!</div>`).join('');}
  }
}

function pgDashboard(){
  const tm=thisMonth(),td=today();
  const totalMembers=DB.members.length;
  const todayOff=DB.mealoffs.filter(m=>m.date===td).length;
  const todayBazar=DB.bazars.filter(b=>b.date===td).reduce((s,b)=>s+(b.total||0),0);
  const paidIds=new Set(DB.payments.filter(p=>p.month===tm).map(p=>p.memberId));
  const pending=DB.members.filter(m=>!paidIds.has(m.id)).reduce((s,m)=>s+(m.bill||DB.settings.defaultBill||200),0);
  const todayMeals=DB.meals.filter(m=>m.date===td).reduce((s,m)=>s+(m.count||0),0);

  const monthBzr=DB.bazars.filter(b=>b.date&&b.date.startsWith(tm)).reduce((s,b)=>s+(b.total||0),0);
  const monthExp=DB.expenses.filter(e=>e.date&&e.date.startsWith(tm)).reduce((s,e)=>s+(e.amount||0),0);
  const monthMeals=DB.meals.filter(m=>m.date&&m.date.startsWith(tm)).reduce((s,m)=>s+(m.count||0),0);
  const mealRate=monthMeals>0?Math.round((monthBzr+monthExp)/monthMeals):0;
  const advBalance=DB.advances.reduce((s,a)=>s+(a.amount||0),0);
  const dueMembers=DB.members.filter(m=>{const paid=DB.payments.filter(p=>p.memberId===m.id&&p.month===tm).reduce((s,p)=>s+(p.amount||0),0);return (m.bill||DB.settings.defaultBill||200)>paid});

  return `
    <div class="stats">
      <div class="stat g"><div class="stat-v">${totalMembers}</div><div class="stat-l">সদস্য</div></div>
      <div class="stat a"><div class="stat-v">৳${mealRate}</div><div class="stat-l">মিল রেট</div></div>
      <div class="stat b"><div class="stat-v">৳${todayBazar}</div><div class="stat-l">আজ বাজার</div></div>
      <div class="stat r"><div class="stat-v">${dueMembers.length}</div><div class="stat-l">বাকিদার</div></div>
    </div>
    <div class="card"><div class="card-t">💰 মাসিক সামারি</div>
      <div class="row"><div class="gp"><label>মোট বাজার</label><div style="font-weight:700;color:var(--blue)">৳${monthBzr}</div></div><div class="gp"><label>মোট খরচ</label><div style="font-weight:700;color:var(--amber)">৳${monthExp}</div></div></div>
      <div class="row"><div class="gp"><label>মোট মিল</label><div style="font-weight:700;color:var(--green)">${monthMeals} টি</div></div><div class="gp"><label>অগ্রিম ব্যালেন্স</label><div style="font-weight:700;color:var(--green)">৳${advBalance}</div></div></div>
    </div>
    <div class="card"><div class="card-t">🍱 আজকের মিল</div><div style="font-size:1.8rem;font-weight:800;color:var(--green);text-align:center;padding:14px">${todayMeals} <span style="font-size:0.9rem;color:var(--text-muted)">মিল</span></div></div>
    ${dueMembers.length>0?`<div class="card"><div class="card-t" style="color:var(--red)">⚠️ বাকিদার (${dueMembers.length})</div>${dueMembers.slice(0,5).map(m=>{const paid=DB.payments.filter(p=>p.memberId===m.id&&p.month===tm).reduce((s,p)=>s+(p.amount||0),0);const due=(m.bill||DB.settings.defaultBill||200)-paid;return `<div class="fs" style="border-left-color:var(--red)"><div style="flex:1"><b>${esc(m.name)}</b> (${esc(m.room)})</div><div style="color:var(--red);font-weight:700">৳${due} বাকি</div></div>`}).join('')}${dueMembers.length>5?`<div style="text-align:center;color:var(--text-muted);font-size:0.78rem;padding:4px">আরো ${dueMembers.length-5} জন...</div>`:''}</div>`:''}
    <div class="card"><div class="card-t">🏢 ফ্লোর</div><div id="dash-floors"></div></div>
    <div class="card"><div class="card-t">📢 নোটিশ</div><div id="dash-notices"></div></div>
  `;
}

function pgMembers(){
  return `
    <div class="card"><div class="card-t">➕ নতুন সদস্য যোগ</div>
      <div class="row"><div class="gp"><label>নাম</label><input id="m-name" placeholder="নাম"></div><div class="gp"><label>রুম</label><input id="m-room" placeholder="রুম নং"></div></div>
      <div class="row"><div class="gp"><label>ফ্লোর</label><select id="m-floor">${floorOpts(DB.floors[0]||'')}</select></div><div class="gp"><label>মোবাইল</label><input id="m-phone" placeholder="01XXX"></div></div>
      <div class="row"><div class="gp"><label>মাসিক বিল (৳)</label><input type="number" id="m-bill" value="${DB.settings.defaultBill||200}"></div><div class="gp"><label>জন্মদিন</label><input type="date" id="m-bd"></div></div>
      <div class="alert ag">📅 যোগ দিচ্ছেন: <b>${new Date().toLocaleDateString('bn-BD')}</b></div>
      <button class="btn btn-p" onclick="addMember()">✅ যোগ করুন</button>
    </div>
    <div class="card"><div class="card-t">👥 সদস্যগণ (<span id="mc">0</span>)</div>
      <div class="sb"><input id="ms" placeholder="🔍 খুঁজুন..." oninput="renderMemberList()"><select id="mff" onchange="renderMemberList()"><option value="">সব ফ্লোর</option>${floorOpts('')}</select></div>
      <div id="ml"></div>
    </div>`;
}

function addMember(){
  const name=document.getElementById('m-name').value.trim();
  const room=document.getElementById('m-room').value.trim();
  const phone=document.getElementById('m-phone').value.trim();
  const floor=document.getElementById('m-floor').value;
  const bill=parseFloat(document.getElementById('m-bill').value)||200;
  const bd=document.getElementById('m-bd').value;
  if(!name||!room){alert('নাম ও রুম দিন','r');return}
  const joinDate=today();
  DB.members.push({id:Date.now(),name,room,phone,floor,bill,birthday:bd,join:joinDate,status:'active'});
  DB.memberHistory.push({memberId:Date.now(),name,room,action:'joined',date:joinDate,note:'নতুন সদস্য যোগ'});
  save();alert('সদস্য যোগ হয়েছে');
  document.getElementById('m-name').value='';document.getElementById('m-room').value='';document.getElementById('m-phone').value='';document.getElementById('m-bd').value='';
  renderMemberList();
}

function renderMemberList(){
  const q=(document.getElementById('ms')?.value||'').toLowerCase();
  const ff=document.getElementById('mff')?.value||'';
  const tm=thisMonth();
  const list=DB.members.filter(m=>{
    const okq=!q||m.name.toLowerCase().includes(q)||(m.room+'').includes(q);
    const okf=!ff||m.floor===ff;
    return okq&&okf;
  });
  document.getElementById('mc').textContent=DB.members.length;
  const el=document.getElementById('ml');
  if(!list.length){el.innerHTML='<div class="empty"><div class="icon">👥</div><p>কোনো সদস্য নেই</p></div>';return}
  el.innerHTML=list.map(m=>{
    const paid=DB.payments.filter(p=>p.memberId===m.id&&p.month===tm).reduce((s,p)=>s+(p.amount||0),0);
    const bill=m.bill||DB.settings.defaultBill||200;
    const due=bill-paid;
    const bal=due<=0?`<span class="bp">+৳${Math.abs(due)} জমা</span>`:`<span class="bn">৳${due} বাকি</span>`;
    const status=m.status==='inactive'?'<span class="badge br">বের হয়েছে</span>':'';
    return `<div class="mi"><div class="ma">${esc(m.name).charAt(0)}</div><div style="flex:1"><div class="mname">${esc(m.name)} ${status}</div><div class="mmeta">রুম ${esc(m.room)} · ${esc(m.floor||'ফ্লোর নেই')} · ৳${bill}/মাস${m.birthday?' · 🎂 '+fmtDate(m.birthday):''}</div></div><div><div class="mb">${bal}</div><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-o btn-sm" onclick="markLeft(${m.id})" title="বের করুন">🚪</button><button class="btn btn-d btn-sm" onclick="delMember(${m.id})">🗑️</button></div></div></div>`;
  }).join('');
}

function markLeft(id){

function renderMealList(){
  const d=document.getElementById('ml-d').value||today();
  const ff=document.getElementById('ml-ff').value;
  const list=DB.members.filter(m=>!ff||m.floor===ff);
  const info=document.getElementById('ml-info');
  const tot=DB.meals.filter(m=>m.date===d).reduce((s,m)=>s+(m.count||0),0);
  const todayBzr=DB.bazars.filter(b=>b.date===d).reduce((s,b)=>s+(b.total||0),0);
  const tm=thisMonth();
  const allMeals=DB.meals.filter(m=>m.date&&m.date.startsWith(tm)).reduce((s,m)=>s+(m.count||0),0);
  const mBzr=DB.bazars.filter(b=>b.date&&b.date.startsWith(tm)).reduce((s,b)=>s+(b.total||0),0);
  const mExp=DB.expenses.filter(e=>e.date&&e.date.startsWith(tm)).reduce((s,e)=>s+(e.amount||0),0);
  const rate=allMeals>0?Math.round((mBzr+mExp)/allMeals):0;
  if(info)info.innerHTML=`💡 মিল রেট: <b>৳${rate}</b> | আজ মিল: <b>${tot}</b> | মাসিক মিল: <b>${allMeals}</b>`;

function chgMeal(mid,delta,d){
  let ex=DB.meals.find(x=>x.date===d&&x.memberId===mid);
  if(!ex){ex={id:Date.now()+mid,date:d,memberId:mid,count:0};DB.meals.push(ex)}
  ex.count=Math.max(0,(ex.count||0)+delta);
  save();renderMealList();
}

function renderMealSummary(){
  const fm=document.getElementById('ml-sm').value;

  if(!fm){el.innerHTML='<div class="empty"><div class="icon">📊</div><p>মাস দিন</p></div>';return}
  const mls=DB.meals.filter(m=>m.date&&m.date.startsWith(fm));
  const bzr=DB.bazars.filter(b=>b.date&&b.date.startsWith(fm)).reduce((s,b)=>s+(b.total||0),0);
  const exp=DB.expenses.filter(e=>e.date&&e.date.startsWith(fm)).reduce((s,e)=>s+(e.amount||0),0);

// স্টেটমেন্ট
function pgStatement(){
  return `
    <div class="card"><div class="card-t">🧾 মাসিক স্টেটমেন্ট</div>
      <div class="row"><div class="gp"><label>সদস্য</label><select id="stmt-m"><option value="">-- সবাই --</option>${DB.members.map(m=>`<option value="${m.id}">${esc(m.name)} (${esc(m.room)})</option>`).join('')}</select></div><div class="gp"><label>মাস</label><input type="month" id="stmt-mo"></div></div>
      <button class="btn btn-p" onclick="genStatement()">🧾 তৈরি করুন</button>
      <div id="stmt-out" style="margin-top:15px"></div></div>`;
}
function setStmtDefaults(){const m=document.getElementById('stmt-mo');if(m)m.value=thisMonth();}
function genStatement(){
  const mid=document.getElementById('stmt-m').value,mo=document.getElementById('stmt-mo').value,el=document.getElementById('stmt-out');
  if(!mo){alert('মাস দিন','r');return}
  const members=mid?DB.members.filter(x=>x.id==mid):DB.members;
  if(!members.length){el.innerHTML='<div class="empty">কোনো সদস্য নেই</div>';return}
  const bzr=DB.bazars.filter(b=>b.date&&b.date.startsWith(mo)).reduce((s,b)=>s+(b.total||0),0);
  const exp=DB.expenses.filter(e=>e.date&&e.date.startsWith(mo)).reduce((s,e)=>s+(e.amount||0),0);
  const totalCost=bzr+exp;
  const meals=DB.meals.filter(m=>m.date&&m.date.startsWith(mo));
  const totalMeals=meals.reduce((s,m)=>s+(m.count||0),0);
  const mealRate=totalMeals>0?Math.round(totalCost/totalMeals):0;
  let html=`<div class="alert ag">📅 ${mo} মাসের স্টেটমেন্ট</div>`;
  html+=`<div class="stats" style="margin-bottom:12px"><div class="stat b"><div class="stat-v">৳${totalCost}</div><div class="stat-l">মোট খরচ</div></div><div class="stat g"><div class="stat-v">${totalMeals}</div><div class="stat-l">মোট মিল</div></div><div class="stat a"><div class="stat-v">৳${mealRate}</div><div class="stat-l">মিল রেট</div></div></div>`;
  html+=`<div class="tw"><table><thead><tr><th>নাম</th><th>রুম</th><th>মিল</th><th>খরচ</th><th>বিল</th><th>জমা</th><th>বাকি</th></tr></thead><tbody>`;
  members.forEach(m=>{
    const mMeals=meals.filter(x=>x.memberId===m.id).reduce((s,x)=>s+(x.count||0),0);
    const mealCost=mMeals*mealRate;
    const bill=m.bill||DB.settings.defaultBill||200;
    const paid=DB.payments.filter(x=>x.memberId===m.id&&x.month===mo).reduce((s,x)=>s+(x.amount||0),0);
    const due=bill+mealCost-paid;
    html+=`<tr><td>${esc(m.name)}</td><td>${esc(m.room)}</td><td>${mMeals}</td><td>৳${mealCost}</td><td>৳${bill}</td><td>৳${paid}</td><td style="color:${due>0?'var(--red)':'var(--green)'};font-weight:700">${due>0?'৳'+due:'✅'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<button class="btn btn-b" style="margin-top:10px" onclick="printStmt('${mo}')">🖨️ প্রিন্ট</button>`;
  el.innerHTML=html;
}
function printStmt(mo){
  const w=window.open('','','width=800,height=600');
  w.document.write('<html><head><title>স্টেটমেন্ট '+mo+'</title><style>body{font-family:Arial;padding:20px}h1{color:#1a6b3c}table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#1a6b3c;color:#fff;padding:8px;text-align:left}td{padding:6px 8px;border-bottom:1px solid #ddd}</style></head><body><h1>🧾 মেস স্টেটমেন্ট</h1><h2>'+mo+'</h2>'+document.getElementById('stmt-out').innerHTML+'</body></html>');
  w.document.close();w.print();
}

function pgReport(){
  return `
    <div class="card"><div class="card-t">📊 মাসিক রিপোর্ট</div>
      <div class="row"><div class="gp"><label>মাস</label><input type="month" id="rpt-month"></div><div class="gp" style="justify-content:flex-end;flex-direction:row;align-items:flex-end"><button class="btn btn-p" onclick="genReport()">📊 তৈরি</button><button class="btn btn-o" onclick="printReport()">🖨️ প্রিন্ট</button></div></div>
      <div id="rpt-out"></div></div>`;
}
function genReport(){
  const m=document.getElementById('rpt-month').value;
  if(!m){alert('মাস দিন','r');return}
  const bzr=DB.bazars.filter(b=>b.date&&b.date.startsWith(m)).reduce((s,b)=>s+(b.total||0),0);
  const exBy={};DB.expenses.filter(e=>e.date&&e.date.startsWith(m)).forEach(e=>{exBy[e.type]=(exBy[e.type]||0)+(e.amount||0)});
  const exTot=Object.values(exBy).reduce((s,v)=>s+v,0);
  const totExp=bzr+exTot;
  const totColl=DB.payments.filter(p=>p.month===m).reduce((s,p)=>s+(p.amount||0),0);
  const bal=totColl-totExp;
  const guest=DB.guests.filter(g=>g.date&&g.date.startsWith(m)).reduce((s,g)=>s+(g.amount||0),0);
  const mls=DB.meals.filter(x=>x.date&&x.date.startsWith(m)).reduce((s,x)=>s+(x.count||0),0);
  const rate=mls>0?Math.round(totExp/mls):0;
  const paidMap={};DB.payments.filter(p=>p.month===m).forEach(p=>{paidMap[p.memberId]=(paidMap[p.memberId]||0)+p.amount});
  const offMap={};DB.mealoffs.filter(x=>x.date&&x.date.startsWith(m)).forEach(x=>{offMap[x.memberId]=(offMap[x.memberId]||0)+1});
  let expRows=`<tr><td>🛒 বাজার</td><td style="text-align:right">৳${bzr}</td></tr>`;
  Object.entries(exBy).forEach(([t,a])=>{expRows+=`<tr><td>${esc(t)}</td><td style="text-align:right">৳${a}</td></tr>`});
  expRows+=`<tr style="background:var(--green-pale);font-weight:700"><td>মোট খরচ</td><td style="text-align:right">৳${totExp}</td></tr>`;
  const chartItems=[{name:'বাজার',amount:bzr,color:'var(--blue)'},...Object.entries(exBy).map(([t,a])=>({name:t,amount:a,color:'var(--amber)'}))];
  const maxAmt=Math.max(...chartItems.map(x=>x.amount),1);
  const chartHtml=chartItems.map(x=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:2px"><b>${esc(x.name)}</b><b>৳${x.amount}</b></div><div style="background:var(--gray-border);border-radius:4px;height:18px;overflow:hidden"><div style="background:${x.color};height:100%;width:${Math.round((x.amount/maxAmt)*100)}%;border-radius:4px"></div></div></div>`).join('');
  document.getElementById('rpt-out').innerHTML=`
    <div class="stats">
      <div class="stat g"><div class="stat-v">৳${totColl}</div><div class="stat-l">মোট জমা</div></div>
      <div class="stat r"><div class="stat-v">৳${totExp}</div><div class="stat-l">মোট খরচ</div></div>
      <div class="stat b"><div class="stat-v">৳${rate}</div><div class="stat-l">মিল রেট</div></div>
      <div class="stat ${bal>=0?'g':'r'}"><div class="stat-v">৳${Math.abs(bal)}</div><div class="stat-l">${bal>=0?'উদ্বৃত্ত':'ঘাটতি'}</div></div>
    </div>
    <div class="card"><div class="card-t">📊 খরচের চার্ট</div>${chartHtml}</div>
    <div class="card"><div class="card-t">💸 খরচের বিবরণ</div><div class="tw"><table>${expRows}</table></div></div>
    <div class="card"><div class="card-t">👥 সদস্য ভিত্তিক</div>
      <div class="tw"><table><thead><tr><th>নাম</th><th>ফ্লোর</th><th>রুম</th><th>বিল</th><th>জমা</th><th>মিল অফ</th><th>ব্যালেন্স</th></tr></thead><tbody>${DB.members.map(m2=>{
        const p=paidMap[m2.id]||0;const o=offMap[m2.id]||0;const b=(m2.bill||DB.settings.defaultBill||200)-p;
        return `<tr><td>${esc(m2.name)}</td><td>${esc(m2.floor||'-')}</td><td>${esc(m2.room)}</td><td>৳${m2.bill||200}</td><td><span class="badge bg">৳${p}</span></td><td><span class="badge ba">${o}টি</span></td><td><span class="badge ${b<=0?'bg':'br'}">${b<=0?'+৳'+Math.abs(b):'৳'+b}</span></td></tr>`;
      }).join('')}</tbody></table></div></div>
    ${guest?`<div class="card"><div class="card-t">👨‍👩‍👧 অতিথি চার্জ</div><div style="font-size:1.2rem;font-weight:700;color:var(--blue)">মোট ৳${guest}</div></div>`:''}`;
}
function printReport(){const m=document.getElementById('rpt-month').value;const w=window.open('','','width=800,height=600');w.document.write('<html><head><title>রিপোর্ট '+m+'</title><style>body{font-family:Arial;padding:20px}h1{color:#1a6b3c}table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#1a6b3c;color:#fff;padding:8px;text-align:left}td{padding:6px 8px;border-bottom:1px solid #ddd}</style></head><body><h1>🍽️ মেস রিপোর্ট</h1><h2>'+m+'</h2>'+document.getElementById('rpt-out').innerHTML+'</body></html>');w.document.close();w.print()}

function pgSettings(){
  return `
    <div class="card"><div class="card-t">⚙️ মেস সেটিংস</div>
      <div class="row"><div class="gp"><label>মেসের নাম</label><input id="st-name"></div><div class="gp"><label>ডিফল্ট বিল (৳)</label><input type="number" id="st-bill"></div></div>
      <div class="row"><div class="gp"><label>ঠিকানা</label><input id="st-addr"></div><div class="gp"><label>ম্যানেজার</label><input id="st-mgr"></div></div>
      <button class="btn btn-p" onclick="saveSettings()">💾 সেভ</button>
    </div>
    <div class="card"><div class="card-t">💾 ব্যাকআপ</div>
      <div class="alert ag">সব ডেটা JSON এ এক্সপোর্ট বা ইম্পোর্ট করুন।</div>
      <div class="row"><div class="gp"><button class="btn btn-b" onclick="exportData()">📤 এক্সপোর্ট</button></div><div class="gp"><input type="file" id="imp-file" accept=".json" onchange="importData(event)"></div></div>
      <button class="btn btn-d" style="margin-top:6px" onclick="clearAll()">🗑️ সব মুছুন</button>
    </div>
    <div class="card"><div class="card-t">🎂 আজকের জন্মদিন</div><div id="bd-tdy"></div></div>
    <div class="card"><div class="card-t">🎉 আসন্ন জন্মদিন</div><div id="bd-up"></div></div>`;
}
function loadSettings(){
  document.getElementById('st-name').value=DB.settings.messName||'';
  document.getElementById('st-bill').value=DB.settings.defaultBill||200;
  document.getElementById('st-addr').value=DB.settings.address||'';
  document.getElementById('st-mgr').value=DB.settings.manager||'';
  renderBirthdays();
}
function saveSettings(){
  DB.settings.messName=document.getElementById('st-name').value.trim();
  DB.settings.defaultBill=parseFloat(document.getElementById('st-bill').value)||200;
  DB.settings.address=document.getElementById('st-addr').value.trim();
  DB.settings.manager=document.getElementById('st-mgr').value.trim();
  save();updateHeader();alert('সেটিংস সেভ ✅');
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mess_backup_'+today()+'.json';a.click();
  alert('এক্সপোর্ট সম্পন্ন');
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{const x=JSON.parse(e.target.result);if(!confirm('সব ডেটা প্রতিস্থাপন হবে। চালিয়ে যাবেন?'))return;Object.keys(x).forEach(k=>DB[k]=x[k]);save();alert('ইম্পোর্ট সম্পন্ন');showPage(CUR);}catch(err){alert('ভুল ফাইল','r')}
  };r.readAsText(f);
  ev.target.value='';
}
function clearAll(){if(!confirm('সব ডেটা মুছবেন?'))return;if(!confirm('সত্যিই?'))return;localStorage.removeItem('messDB');location.reload()}
function renderBirthdays(){
  const tdy=today().slice(5);
  const tdyMs=DB.members.filter(m=>m.birthday&&m.birthday.slice(5)===tdy);
  const tEl=document.getElementById('bd-tdy');
  if(tEl){tEl.innerHTML=tdyMs.length?tdyMs.map(m=>`<div class="bd-card">🎂 <b>${esc(m.name)}</b> (রুম ${esc(m.room)})</div>`).join(''):'<div style="color:var(--text-muted);font-size:0.82rem">আজ কারো জন্মদিন নেই</div>';}
  const upEl=document.getElementById('bd-up');
  if(upEl){
    const now=new Date();const yr=now.getFullYear();
    const list=DB.members.filter(m=>m.birthday).map(m=>{
      const bd=new Date(m.birthday);bd.setFullYear(yr);
      if(bd<now)bd.setFullYear(yr+1);
      const days=Math.ceil((bd-now)/(1000*60*60*24));
      return {...m,days,bdDate:bd};
    }).filter(m=>m.days<=30).sort((a,b)=>a.days-b.days);
    upEl.innerHTML=list.length?list.map(m=>`<div class="mi"><div class="ma">🎂</div><div style="flex:1"><div class="mname">${esc(m.name)}</div><div class="mmeta">${fmtDate(m.birthday)}</div></div><div><span class="badge ba">${m.days===0?'আজই':m.days+' দিনে'}</span></div></div>`).join(''):'<div style="color:var(--text-muted);font-size:0.82rem">কোনো আসন্ন জন্মদিন নেই</div>';
  }
}

function updateHeader(){
  document.getElementById('messName').textContent=DB.settings.messName||'আমার মেস';
  const now=new Date();
  const options={weekday:'short',year:'numeric',month:'short',day:'numeric'};
  document.getElementById('hd').textContent=now.toLocaleDateString('bn-BD',options);
}

// ====== INIT ======
function init(){
  load();
  updateHeader();
  showPage('dashboard');
}
init();
</script>
</body>
</html>
